<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms Lê Hằng English - Interactive English Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(-45deg, #8854C0, #00C9A7, #FDCB6E, #E84393);
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 0 rgba(0,0,0,0.1);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--primary-bg);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* SVG Patterns */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c0-1.1.9-2 2-2h10a2 2 0 0 1 2 2 2 2 0 0 1-2 2H32a2 2 0 0 1-2-2zm-10-10c0-1.1.9-2 2-2h10a2 2 0 0 1 2 2 2 2 0 0 1-2 2H22a2 2 0 0 1-2-2z' fill='%23ffffff' fill-opacity='0.1'/%3E%3Ccircle cx='10' cy='10' r='2' fill='%23ffffff' fill-opacity='0.1'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
        }

        header {
            text-align: center;
            padding: 20px;
            z-index: 10;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        h1 { font-family: 'Nunito', sans-serif; font-size: 2.5rem; margin-bottom: 0; }
        h4 { margin-top: 5px; opacity: 0.9; font-weight: 400; }

        #test-container {
            width: 90%;
            max-width: 800px;
            z-index: 1;
            padding-bottom: 100px;
        }

        .exercise-title {
            background: #FF7675;
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            margin-top: 40px;
            box-shadow: 0 6px 0 #D63031;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            margin: 25px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 4px solid white;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2D3436;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            background: white;
            border: 3px solid #DFE6E9;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #DFE6E9;
            position: relative;
            outline: none;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            border-color: #81ecec;
            box-shadow: 0 9px 0 #81ecec;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #DFE6E9;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            color: white !important;
            border-color: #00B359 !important;
            box-shadow: 0 6px 0 #00B359 !important;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            color: white !important;
            border-color: #D63031 !important;
            box-shadow: 0 6px 0 #D63031 !important;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .explanation {
            margin-top: 20px;
            padding: 20px;
            background: #f8faff;
            border-left: 8px solid #0984e3;
            border-radius: 15px;
            display: none;
            font-size: 1rem;
            color: #34495e;
            line-height: 1.6;
        }

        .explanation h5 { color: #0984e3; margin-top: 0; font-size: 1.1rem; }

        /* Jumbled words / Input styling */
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .text-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 15px;
            border: 3px solid #dfe6e9;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }
        .check-btn {
            background: #6C5CE7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 0 #5849BE;
            cursor: pointer;
            font-weight: 700;
        }

        /* Phone & Sale components */
        .sale-sign {
            background: #FFEB3B;
            padding: 20px;
            border: 5px dashed #F44336;
            text-align: center;
            font-weight: 800;
            color: #F44336;
            margin: 10px 0;
            border-radius: 10px;
        }
        .phone-mockup {
            background: #2d3436;
            width: 200px;
            padding: 20px 10px;
            border-radius: 30px;
            margin: 0 auto;
            color: white;
        }
        .phone-screen {
            background: #fff;
            height: 150px;
            border-radius: 10px;
            color: #333;
            padding: 10px;
            font-size: 0.9rem;
        }

        /* Result Modal */
        #result-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            width: 80%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .score-circle {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: #fab1a0;
            line-height: 120px;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin: 20px auto;
            border: 8px solid #ff7675;
        }
        .submit-all-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00B894;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            box-shadow: 0 8px 0 #009475;
            cursor: pointer;
            z-index: 100;
            border: none;
            transition: 0.2s;
        }
        .submit-all-btn:hover { transform: scale(1.1); }

        canvas#confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        u { text-decoration: underline; font-weight: 800; color: #e84393; }

        /* Gap Fill Dropdown Style */
        .gap-select {
            display: inline-block;
            background: #fff;
            border: 3px solid #81ecec;
            border-radius: 10px;
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            font-weight: 700;
            color: #0984e3;
        }
        .gap-select:empty::before { content: "........"; color: #b2bec3; }

        .popup-menu {
            position: absolute;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 10px;
            display: none;
            z-index: 200;
            width: 150px;
        }
        .popup-item {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
        }
        .popup-item:hover { background: #f0f0f0; }

        /* Underline Mistakes style */
        .word-token {
            display: inline-block;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .word-token:hover { background: #ffeaa7; }
        .word-token.selected-wrong {
            background: var(--wrong-color);
            color: white;
            text-decoration: line-through;
        }
    </style>
</head>
<body>

<canvas id="confetti"></canvas>

<header>
    <h1>Vocabulary & Grammar Test</h1>
    <h4>Ms Lê Hằng English</h4>
</header>

<div id="test-container">
    </div>

<button class="submit-all-btn" onclick="finishTest()">Nộp Bài / Submit</button>

<div id="result-modal">
    <div class="modal-content">
        <h2 id="result-title">Tuyệt vời!</h2>
        <div class="score-circle" id="score-text">0/0</div>
        <p id="result-feedback">Bạn đã hoàn thành rất tốt bài tập này!</p>
        <button class="check-btn" onclick="location.reload()">Làm lại / Retry</button>
    </div>
</div>

<script>
    // Audio Context for synthetic sounds
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.2); // A2
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // Confetti effect
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function createConfetti() {
        particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 10 + 5,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`,
                speed: Math.random() * 5 + 2,
                angle: Math.random() * 6.28
            });
        }
        animateConfetti();
    }
    function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.y += p.speed;
            p.angle += 0.1;
            ctx.fillStyle = p.color;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
        });
        if(particles.length > 0 && particles[0].y < canvas.height * 1.5) {
            requestAnimationFrame(animateConfetti);
        }
    }
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Database
    const testData = {

            { id: 'ex4_4', q: 'r-e-u-l-r', a: 'ruler' },
            { id: 'ex4_5', q: 'n-u-i-f-r-o-m', a: 'uniform' },
            { id: 'ex4_6', q: 'a-b-o-d-r', a: 'board' },
            { id: 'ex4_7', q: 'e-d-k-s', a: 'desk' },
            { id: 'ex4_8', q: 'e-p-l-c-n-i', a: 'pencil' },
            { id: 'ex4_9', q: 'b-y-i-c-l-c-e', a: 'bicycle' },
            { id: 'ex4_10', q: 'p-n-e-i-c-l-a-c-s-e', a: 'pencil case' }

    function checkChoice(btn, selected, correct, qId) {
        if (btn.parentElement.classList.contains('answered')) return;
        
        const card = document.getElementById(`card_${qId}`);
        const ex = document.getElementById(`ex_${qId}`);
        btn.parentElement.classList.add('answered');

        if (selected === correct) {
            btn.classList.add('correct');
            playSound('correct');
            totalScore++;
        } else {
            btn.classList.add('wrong');
            playSound('wrong');
            // Highlight the correct one
            const buttons = btn.parentElement.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                if (b.innerText === correct) b.classList.add('correct');
            });
        }
        ex.style.display = 'block';
        questionsAnswered++;
    }

    function checkInput(id, correct) {
        const input = document.getElementById(`input_${id}`);
        const ex = document.getElementById(`ex_${id}`);
        
        if (input.value.toLowerCase().trim() === correct.toLowerCase()) {
            input.style.borderColor = "var(--correct-color)";
            playSound('correct');
            totalScore++;
        } else {
            input.style.borderColor = "var(--wrong-color)";
            playSound('wrong');
        }
        ex.style.display = "block";
        questionsAnswered++;
    }

    function showEx(id) {
        document.getElementById(`ex_${id}`).style.display = 'block';
    }

    function finishTest() {
        const modal = document.getElementById('result-modal');
        const scoreText = document.getElementById('score-text');
        const feedback = document.getElementById('result-feedback');
        
        scoreText.innerText = `${totalScore}/${questionsAnswered || 0}`;
        
        if (totalScore > 10) {
            createConfetti();
            document.getElementById('result-title').innerText = "Tuyệt vời ông mặt trời!";
        } else {
            document.getElementById('result-title').innerText = "Cố gắng lên nhé!";
        }
        
        modal.style.display = 'flex';
    }

    renderTest();
</script>
